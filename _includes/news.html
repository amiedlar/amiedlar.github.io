<section class="news-section">
  <ul class="news-list">
    {% assign news = site.data.news | sort: "date" | reverse %}
    {% for item in news limit:4 %}
      <li>
        <span class="news-date">{{ item.date | date: "%b %Y" }}</span>
        <span>{{ item.text | markdownify | remove: '<p>' | remove: '</p>' }}</span>
      </li>
    {% endfor %}
  </ul>
</section>
